log             = { workspace = true }

# Plugin libs statically linked
gst-fluxsrc      = { path = "../gst-fluxsrc" }
gst-fluxdemux    = { path = "../gst-fluxdemux" }
gst-fluxdeframer = { path = "../gst-fluxdeframer" }
gst-fluxcdbc     = { path = "../gst-fluxcdbc" }
